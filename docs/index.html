<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 写真提示词导演</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);min-height:100vh;color:#1e293b}
.container{max-width:900px;margin:0 auto;padding:24px 16px 60px}
.header{text-align:center;padding:32px 0 20px}
.header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#64748b;margin-top:6px;font-size:14px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px;color:#334155}
.cat-grid{display:flex;gap:10px;flex-wrap:wrap}
.cat-btn{padding:10px 18px;border-radius:24px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:14px;transition:.2s;white-space:nowrap}
.cat-btn:hover{border-color:#6366f1;color:#6366f1}
.cat-btn.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-color:transparent}
.sub-grid{display:flex;gap:8px;flex-wrap:wrap;max-height:0;overflow:hidden;transition:max-height .4s,margin-top .4s}
.sub-grid.show{max-height:500px;margin-top:14px}
.sub-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:12px;transition:.2s;white-space:nowrap}
.sub-btn:hover{border-color:#ec4899;color:#ec4899}
.sub-btn.active{background:#fdf2f8;color:#ec4899;border-color:#ec4899}
.pref-input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;resize:none;height:64px;transition:border-color .2s}
.pref-input:focus{outline:none;border-color:#6366f1}
.btn-wrap{text-align:center;margin:16px 0}
.btn{padding:14px 48px;font-size:17px;font-weight:700;border:none;border-radius:32px;cursor:pointer;transition:.3s}
.btn-primary{color:#fff;background:linear-gradient(135deg,#6366f1,#ec4899);box-shadow:0 6px 24px rgba(99,102,241,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(99,102,241,.45)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{padding:12px 32px;font-size:14px;color:#6366f1;background:#eef2ff;border:2px solid #c7d2fe}
.btn-secondary:hover{background:#e0e7ff}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.overlay.hidden{display:none}
.load-card{background:#fff;border-radius:20px;padding:40px;text-align:center;width:380px;max-width:90%}
.load-card h3{margin:16px 0 8px;font-size:18px}
.spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.result.hidden,.settings-panel.hidden{display:none}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.result-img{width:100%;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.result-right{display:flex;flex-direction:column;gap:14px}
.prompt-block{background:#f8fafc;border-radius:12px;padding:16px}
.prompt-block h4{font-size:13px;color:#6366f1;margin-bottom:8px}
.prompt-block .text{font-size:13px;line-height:1.7;color:#334155;max-height:240px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.btn-sm{padding:5px 14px;font-size:11px;border-radius:14px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;transition:.2s;margin-top:8px;margin-right:6px}
.btn-sm:hover{background:#6366f1;color:#fff;border-color:#6366f1}
.btn-sm.copied{background:#10b981;color:#fff;border-color:#10b981}
.btn-sm.download{background:#10b981;color:#fff;border-color:#10b981}
.error-bar{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:16px;border-radius:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.error-bar.hidden{display:none}
.struct-item{margin-bottom:10px}
.struct-label{display:inline-block;font-size:12px;font-weight:600;color:#6366f1;margin-bottom:4px;background:#eef2ff;padding:2px 8px;border-radius:6px}
.struct-item .text{font-size:13px;line-height:1.6;color:#334155;padding-left:4px}
.param-tags{display:flex;gap:8px;flex-wrap:wrap}
.param-tag{font-size:11px;padding:3px 10px;border-radius:10px;background:#eef2ff;color:#4f46e5}
select{padding:8px 12px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:13px;background:#fff}
/* Settings */
.settings-btn{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:18px;z-index:50;transition:.2s}
.settings-btn:hover{border-color:#6366f1}
.settings-panel{position:fixed;top:60px;right:16px;width:380px;max-width:90vw;z-index:50;background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.settings-panel input{width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;font-size:13px;margin-bottom:10px}
.settings-panel input:focus{outline:none;border-color:#6366f1}
.footer{text-align:center;color:#94a3b8;font-size:12px;margin-top:32px}
@media(max-width:640px){
  .result-grid{grid-template-columns:1fr}
  .btn{padding:12px 36px;font-size:15px}
  .header h1{font-size:22px}
  .settings-panel{left:16px;right:16px;width:auto}
}
</style>
</head>
<body>

<!-- Settings -->
<button class="settings-btn" onclick="toggleSettings()" title="API 设置">⚙</button>
<div class="settings-panel hidden" id="settingsPanel">
  <div class="card-title">API 设置（密钥保存在本地浏览器）</div>
  <input type="password" id="dsKey" placeholder="DeepSeek API Key（sk-...）">
  <input type="password" id="gwKey" placeholder="代理 API Key（geeknow.ai）">
  <input type="text" id="gwBase" placeholder="代理地址" value="https://api.geeknow.ai/v1">
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn-sm" style="background:#10b981;color:#fff;border-color:#10b981" onclick="saveSettings()">保存</button>
    <button class="btn-sm" onclick="toggleSettings()">取消</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>AI 写真提示词导演</h1>
    <p>选类别 → 生成提示词 → AI 生图 | <span id="statusTag" style="color:#10b981">API 就绪</span></p>
  </div>

  <!-- Category -->
  <div class="card">
    <div class="card-title">1. 选择写真类别</div>
    <div class="cat-grid" id="catGrid">
      <button class="cat-btn" data-cat="个人写真">个人写真</button>
      <button class="cat-btn" data-cat="婚纱写真">婚纱写真</button>
      <button class="cat-btn" data-cat="旅拍写真">旅拍写真</button>
      <button class="cat-btn" data-cat="创意/概念写真">创意/概念写真</button>
      <button class="cat-btn" data-cat="COS写真">COS写真</button>
    </div>
    <div class="sub-grid" id="subGrid"></div>
  </div>

  <!-- Preference + Model -->
  <div class="card">
    <div class="card-title">2. 自定义偏好 & 模型选择</div>
    <textarea class="pref-input" id="prefInput" placeholder="例如：想要秋天黄昏的感觉，不要摆拍..."></textarea>
    <div style="display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:#64748b">模型:</span>
      <select id="promptModel"></select>
      <button class="btn btn-primary" id="promptBtn" disabled style="margin-left:auto">生成提示词</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-bar hidden" id="errorBar">
    <span id="errorMsg"></span>
    <button class="retry-btn" id="retryBtn" style="padding:6px 16px;border-radius:16px;border:1px solid #dc2626;color:#dc2626;background:#fff;cursor:pointer;font-size:13px">重试</button>
  </div>

  <!-- Prompt Result -->
  <div class="card result hidden" id="promptCard">
    <div class="card-title">提示词方案 <span id="resultTitle" style="font-weight:400;color:#64748b;font-size:13px"></span></div>
    <div style="background:#f0f4ff;border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-weight:600;font-size:14px;margin-bottom:10px;color:#4f46e5">🎬 场景视觉方案</div>
      <div class="struct-item" id="itemScene"><span class="struct-label">📷 场景</span><div class="text"></div></div>
      <div class="struct-item" id="itemAction"><span class="struct-label">💃 动作/姿态</span><div class="text"></div></div>
      <div class="struct-item" id="itemExpression"><span class="struct-label">😊 表情/情绪</span><div class="text"></div></div>
      <div class="struct-item" id="itemLighting"><span class="struct-label">💡 光线方案</span><div class="text"></div></div>
      <div class="struct-item" id="itemTone"><span class="struct-label">🎨 色调/影调</span><div class="text"></div></div>
      <div class="struct-item" id="itemComposition"><span class="struct-label">📐 构图建议</span><div class="text"></div></div>
      <div class="param-tags" id="paramTags" style="margin-top:8px"></div>
    </div>
    <div class="prompt-block" style="margin-bottom:10px">
      <h4>🌐 中文视觉方案</h4><div class="text" id="cnPrompt"></div>
      <button class="btn-sm" data-target="cnPrompt">复制</button>
    </div>
    <div class="prompt-block">
      <h4>🌍 English Prompt</h4><div class="text" id="enPrompt"></div>
      <button class="btn-sm" data-target="enPrompt">复制</button>
    </div>
    <!-- Image generation -->
    <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0">
      <div class="card-title">3. 生成图片</div>
      <div style="display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:10px">
        <select id="sizeSelect">
          <option value="1792x1024">横版 16:9</option>
          <option value="1024x1024">方形 1:1</option>
          <option value="1024x1792">竖版 9:16</option>
        </select>
        <select id="imageModel"></select>
        <button class="btn btn-secondary" id="imageBtn">生成图片</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap">
        <label for="refUpload" style="font-size:12px;color:#64748b;cursor:pointer;padding:6px 14px;border:1px dashed #cbd5e1;border-radius:12px">📷 参考图（可选）</label>
        <input type="file" id="refUpload" accept="image/*" style="display:none" onchange="previewRef(this)">
        <span id="refName" style="font-size:11px;color:#94a3b8"></span>
        <button id="refClear" style="display:none;font-size:11px;padding:2px 8px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer" onclick="clearRef()">清除</button>
      </div>
      <img id="refPreview" style="display:none;max-width:120px;max-height:120px;border-radius:8px;margin:8px auto 0;border:1px solid #e2e8f0">
    </div>
  </div>

  <!-- Image Result -->
  <div class="card result hidden" id="imageCard">
    <div class="card-title">生成图片</div>
    <img class="result-img" id="resultImg" src="" alt="生成写真" crossorigin="anonymous">
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-sm" onclick="window.open(document.getElementById('resultImg').src,'_blank')">新窗口打开</button>
      <button class="btn-sm download" id="downloadBtn">下载图片</button>
    </div>
  </div>

  <div class="footer">AI写真提示词导演 · 纯前端版 · 数据隐私安全</div>
</div>

<!-- Loading -->
<div class="overlay hidden" id="loadingOverlay">
  <div class="load-card">
    <div class="spinner"></div>
    <h3 id="loadingText">生成中...</h3>
    <div style="color:#94a3b8;font-size:12px;margin-top:10px" id="timer"></div>
  </div>
</div>

<script>
// ── API Keys ──
function getDS(){return localStorage.getItem('ds_key')||'sk-0fe9505332be4b408cb9030a97d7a199'}
function getGW(){return localStorage.getItem('gw_key')||'sk-p0HiwUiIGlLJjgAB1DhRNyg7K2OIfH4tcREwsQvk9XYVTdry'}
function getGWBase(){return localStorage.getItem('gw_base')||'https://api.geeknow.ai/v1'}
function saveSettings(){
  localStorage.setItem('ds_key',$('dsKey').value.trim());
  localStorage.setItem('gw_key',$('gwKey').value.trim());
  localStorage.setItem('gw_base',$('gwBase').value.trim()||'https://api.geeknow.ai/v1');
  toggleSettings();
  updateStatus();
}
function updateStatus(){
  const ds=!!getDS(),gw=!!getGW();
  $('statusTag').textContent=ds&&gw?'API 就绪':(ds||gw?'部分 Key 已设':'请先设置 API Key');
  $('statusTag').style.color=ds&&gw?'#10b981':(ds||gw?'#f59e0b':'#f59e0b');
}
function toggleSettings(){
  const p=$('settingsPanel');p.classList.toggle('hidden');
  if(!p.classList.contains('hidden')){$('dsKey').value=getDS();$('gwKey').value=getGW();$('gwBase').value=getGWBase()}
}
updateStatus();

// ── Models ──
const promptModels=[
  {id:'deepseek-chat',name:'DeepSeek',desc:'性价比高'},
  {id:'deepseek-v4-pro',name:'DeepSeek V4 Pro',desc:'推理更强'},
  {id:'gemini-3-pro-preview',name:'Gemini 3 Pro',desc:'Google 旗舰'},
  {id:'gemini-2.5-pro',name:'Gemini 2.5 Pro',desc:'Google 推理'},
  {id:'doubao-seed-1-6-250615',name:'豆包 Seed 1.6',desc:'字节旗舰'},
  {id:'doubao-pro-256k',name:'豆包 Pro',desc:'字节长上下文'},
  {id:'gpt-5',name:'GPT-5',desc:'OpenAI 最新'},
  {id:'gpt-5.4',name:'GPT-5.4',desc:'最新 OpenAI'},
  {id:'claude-opus-4-7',name:'Claude Opus 4.7',desc:'Anthropic'},
  {id:'qwen3-max',name:'通义千问 Max',desc:'阿里'},
  {id:'kimi-k2.6',name:'Kimi K2.6',desc:'月之暗面'},
];
const imageModels=[
  {id:'gpt-image-2',name:'GPT-Image-2',desc:'质量最高'},
  {id:'gpt-image-1.5',name:'GPT-Image-1.5',desc:'OpenAI 生图'},
  {id:'gemini-2.5-flash-image',name:'Gemini Flash Image',desc:'速度最快'},
  {id:'gemini-3-pro-image-preview',name:'Gemini 3 Pro Image',desc:'Google 最新'},
  {id:'doubao-seedream-4-5-251128',name:'豆包 Seedream 4.5',desc:'字节生图'},
  {id:'doubao-seedream-5-0-260128',name:'豆包 Seedream 5.0',desc:'字节最新'},
];

function fillSelect(el,models,defId){
  models.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.name;if(m.id===defId)o.selected=true;el.appendChild(o)});
}
fillSelect($('promptModel'),promptModels,'deepseek-chat');
fillSelect($('imageModel'),imageModels,'gpt-image-2');

// ── State ──
const state={category:null,subStyle:null,loading:false,pendingPrompt:null};
const subStyles={
  '个人写真':['清新日系','黑白情绪','法式慵懒','都市简约','胶片复古','韩系奶油','男友视角','居家随拍','光影切割','港风霓虹','日杂模特','清冷破碎'],
  '婚纱写真':['韩式极简','森系自然','法式庄园','新中式','海边轻纱','城市街拍','电影剧情式','复古胶片','极地冰雪','沙漠风','烟火夜景','花房温室','民国旗袍'],
  '旅拍写真':['城市漫游','自然风光','人文纪实','轻奢度假','公路旅行','极地探险','沙漠穿越','海岛潜水','古城穿越','游牧草原','火车旅行','都市夜景'],
  '创意/概念写真':['童话幻想','复古时代','超现实','戏剧舞台','末日废土','赛博朋克','水下雨林','敦煌飞天','异形生物','破碎娃娃','未来战士','蝴蝶标本'],
  'COS写真':['二次元动漫','游戏角色','古风仙侠','蒸汽朋克','克苏鲁/暗黑奇幻','特摄/超级英雄','赛博忍者','神话众神','洛丽塔/哥特','铠甲骑士','狐妖/妖怪','科幻机甲'],
};
const $=id=>document.getElementById(id);

// ── Category ──
$('catGrid').addEventListener('click',e=>{
  const b=e.target.closest('.cat-btn');if(!b)return;
  state.category=b.dataset.cat;state.subStyle=null;
  document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const sg=$('subGrid');sg.innerHTML='';sg.classList.remove('show');
  if(subStyles[state.category]){
    subStyles[state.category].forEach(s=>{
      const el=document.createElement('button');el.className='sub-btn';el.textContent=s;
      el.onclick=()=>{state.subStyle=s;sg.querySelectorAll('.sub-btn').forEach(x=>x.classList.remove('active'));el.classList.add('active');};
      sg.appendChild(el);
    });
    sg.classList.add('show');
  }
  $('promptBtn').disabled=false;
});

// ── Prompt Generation ──
$('promptBtn').addEventListener('click',async()=>{
  if(state.loading||!getDS()){alert('请先设置 DeepSeek API Key');toggleSettings();return}
  state.loading=true;hideError();showLoading('生成提示词中...');
  try{
    const model=$('promptModel').value;
    const isDeepSeek=model.startsWith('deepseek');
    const baseUrl=isDeepSeek?'https://api.deepseek.com':getGWBase();
    const apiKey=isDeepSeek?getDS():getGW();
    const res=await fetch(baseUrl+'/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model, messages:[
        {role:'system',content:SYSTEM_PROMPT},
        {role:'user',content:`类别：${state.category}\n子风格：${state.subStyle||'随机'}\n用户额外偏好：${$('prefInput').value.trim()||'无'}`}
      ],temperature:0.85,max_tokens:3000})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||e.error||`HTTP ${res.status}`)}
    const d=await res.json(); const raw=d.choices[0].message.content;
    const parsed=parseRaw(raw,state.category);
    showPromptResult(parsed);
  }catch(e){showError(e.message)}finally{state.loading=false;hideLoading()}
});

// ── Parsing ──
function parseRaw(text,cat){
  const r={scene:'',action:'',expression:'',lighting:'',tone:'',composition:'',chinese_prompt:'',english_prompt:'',sub_style:'',photography_params:{},negative_prompt:''};
  let m=text.match(/【子风格名】\s*[：:]\s*(.+?)(?:\n|$)/);if(m)r.sub_style=m[1].trim();
  const extract=(hdr)=>{let m=text.match(new RegExp(hdr+'\\s*[：:]\\s*(.+?)(?=\\n['+'📷💃😊💡🎨📐🌐🌍📝⚠'+']|\\n━━|\\n🎬|\\Z)','s'));return m?m[1].trim():''};
  r.scene=extract('📷 场景');r.action=extract('💃 动作/姿态');r.expression=extract('😊 表情/情绪');
  r.lighting=extract('💡 光线方案');r.tone=extract('🎨 色调/影调');r.composition=extract('📐 构图建议');
  m=text.match(/🌐.*?视觉方案.*?\n(.+?)(?=\n🌍|\nEnglish|\n━━|$)/s);if(m)r.chinese_prompt=m[1].trim();
  m=text.match(/🌍.*?English Prompt.*?\n(.+?)(?=\n━━|\n📝|\n⚠|$)/s);if(m)r.english_prompt=m[1].trim();
  else{m=text.match(/【English Prompt】.*?\n(.+?)(?=\n【|\n📝|$)/s);if(m)r.english_prompt=m[1].trim()}
  if(!r.chinese_prompt)r.chinese_prompt=text.trim();
  if(!r.english_prompt||/[\u4e00-\u9fff]/.test(r.english_prompt.slice(0,50)))r.english_prompt=text.trim();
  r.english_prompt=r.english_prompt.replace(/[【】⚠].*?[：:].*?\n?/g,'').trim();
  if(r.english_prompt.length>980)r.english_prompt=r.english_prompt.slice(0,980);
  ['焦段','光圈','快门','画幅比'].forEach(k=>{let m=text.match(new RegExp(k+'\\s*[：:]\\s*(.+?)(?:\\s{2,}|\\n|$)','s'));if(m)r.photography_params[k]=m[1].trim()});
  return r;
}

function showPromptResult(d){
  state.pendingPrompt=d;
  const map={itemScene:d.scene,itemAction:d.action,itemExpression:d.expression,itemLighting:d.lighting,itemTone:d.tone,itemComposition:d.composition};
  Object.entries(map).forEach(([id,val])=>{const el=$(id);if(el&&val){el.querySelector('.text').textContent=val;el.style.display=''}else if(el)el.style.display='none'});
  $('resultTitle').textContent=`【${state.category}·${d.sub_style||'自动匹配'}】`;
  $('cnPrompt').textContent=d.chinese_prompt;$('enPrompt').textContent=d.english_prompt;
  $('paramTags').innerHTML=Object.entries(d.photography_params||{}).map(([k,v])=>`<span class="param-tag">${k}: ${v}</span>`).join('');
  $('promptCard').classList.remove('hidden');$('imageCard').classList.add('hidden');
  $('promptCard').scrollIntoView({behavior:'smooth'});
}

// ── Image Generation ──
$('imageBtn').addEventListener('click',async()=>{
  if(state.loading||!state.pendingPrompt||!getGW()){alert('请先设置代理 API Key');toggleSettings();return}
  state.loading=true;hideError();showLoading('生成图片中...');
  try{
    const model=$('imageModel').value;
    const refFile=$('refUpload').files[0];
    let url;
    if(refFile){
      const b64=await toBase64(refFile);
      const res=await fetch(getGWBase()+'/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+getGW()},
        body:JSON.stringify({model, messages:[{role:'user',content:[
          {type:'text',text:`Based on this reference photo, generate a similar style portrait. ${state.pendingPrompt.english_prompt}. Size: ${$('sizeSelect').value}.`},
          {type:'image_url',image_url:{url:b64}}
        ]}],max_tokens:4000})
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`)}
      const d=await res.json();const content=d.choices[0].message.content;
      let m=content.match(/!\[.*?\]\((https?:\/\/[^\s)]+)\)/);
      if(!m)m=content.match(/(https?:\/\/[^\s)]+\.(?:png|jpg|jpeg|webp))/);
      url=m?m[1]:'';
    }else{
      const res=await fetch(getGWBase()+'/images/generations',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+getGW()},
        body:JSON.stringify({model,prompt:state.pendingPrompt.english_prompt,size:$('sizeSelect').value,n:1})
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`)}
      const d=await res.json();url=d.data[0].url;
    }
    if(!url)throw new Error('图片生成失败，未返回 URL');
    $('resultImg').src=url;$('imageCard').classList.remove('hidden');
    $('imageCard').scrollIntoView({behavior:'smooth'});
  }catch(e){showError(e.message)}finally{state.loading=false;hideLoading()}
});

// ── Helpers ──
function toBase64(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file)})}
function showLoading(msg){$('loadingText').textContent=msg;$('loadingOverlay').classList.remove('hidden');let s=0;$('timer').textContent='已等待 0 秒';window._tI=setInterval(()=>{s++;$('timer').textContent=`已等待 ${s} 秒`},1000)}
function hideLoading(){$('loadingOverlay').classList.add('hidden');clearInterval(window._tI)}
function showError(msg){$('errorBar').classList.remove('hidden');$('errorMsg').textContent=msg;$('errorBar').scrollIntoView({behavior:'smooth'})}
function hideError(){$('errorBar').classList.add('hidden')}
$('retryBtn').addEventListener('click',()=>{if(state.pendingPrompt)$('imageBtn').click();else $('promptBtn').click()});

// Copy
document.addEventListener('click',e=>{
  const b=e.target.closest('.btn-sm');if(!b||!b.dataset.target)return;
  const el=$(b.dataset.target);if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>{b.textContent='已复制';b.classList.add('copied');setTimeout(()=>{b.textContent='复制';b.classList.remove('copied')},2000)});
});

// Download
$('downloadBtn').addEventListener('click',async()=>{
  const url=$('resultImg').src;if(!url)return;
  try{const r=await fetch(url);const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ai-portrait-'+Date.now()+'.png';a.click();URL.revokeObjectURL(a.href)}catch(e){window.open(url,'_blank')}
});

// Reference image
function previewRef(i){const f=i.files[0];if(!f)return;$('refName').textContent=f.name;$('refClear').style.display='';const r=new FileReader();r.onload=e=>{$('refPreview').src=e.target.result;$('refPreview').style.display=''};r.readAsDataURL(f)}
function clearRef(){$('refUpload').value='';$('refName').textContent='';$('refClear').style.display='none';$('refPreview').style.display='none'}
