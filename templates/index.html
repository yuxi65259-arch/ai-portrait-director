<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 写真创作工坊 — 对话式智能写真</title>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#222240;--primary:#7c3aed;--primary2:#a78bfa;--accent:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--border:#2d2d4a;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-header h2{font-size:15px;font-weight:700;flex:1}
.btn-icon{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.btn-icon:hover{border-color:var(--primary2);color:var(--primary2);background:rgba(124,58,237,.1)}
.conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:.2s;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;display:flex;align-items:center;justify-content:space-between}
.conv-item:hover{background:var(--surface2)}
.conv-item.active{background:rgba(124,58,237,.15);color:var(--text);font-weight:600}
.conv-item .del{font-size:14px;opacity:0;cursor:pointer;color:#ef4444;flex-shrink:0;margin-left:8px}
.conv-item:hover .del{opacity:1}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sidebar-footer a{color:var(--primary2);text-decoration:none}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.main-header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
.main-header h3{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-header select{padding:6px 10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;outline:none}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.chat-welcome{text-align:center;color:var(--text2);padding:60px 20px}
.chat-welcome h2{font-size:24px;background:linear-gradient(135deg,#c4b5fd,#a78bfa,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.chat-welcome p{font-size:14px;margin-bottom:4px}
.msg{display:flex;gap:12px;max-width:88%;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.user .msg-avatar{background:rgba(124,58,237,.2)}
.msg.ai .msg-avatar{background:rgba(245,158,11,.2)}
.msg-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:13px;line-height:1.6;max-width:100%;overflow:hidden}
.msg.user .msg-bubble{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3)}
.msg-content{color:var(--text);white-space:pre-wrap;word-break:break-word}
.msg-meta{font-size:10px;color:var(--text2);margin-top:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.msg-meta button{background:none;border:none;color:var(--primary2);cursor:pointer;font-size:10px;padding:0}
.msg-meta button:hover{text-decoration:underline}
.prompt-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:10px;max-height:200px;overflow-y:auto}
.prompt-box summary{font-size:12px;color:var(--primary2);cursor:pointer;font-weight:600;margin-bottom:4px}
.prompt-box .fld{margin:4px 0}
.prompt-box .fl{font-size:10px;color:var(--primary2);font-weight:600}
.prompt-box .fv{font-size:12px;color:var(--text2);line-height:1.5;white-space:pre-wrap}
.img-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.img-card{position:relative;width:140px;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:.2s}
.img-card:hover{border-color:var(--primary)}
.img-card img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
.img-actions{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);display:flex;gap:4px;padding:4px;justify-content:center;opacity:0;transition:.2s}
.img-card:hover .img-actions{opacity:1}
.img-btn{padding:3px 8px;border-radius:4px;border:none;font-size:10px;cursor:pointer;color:#fff;background:rgba(255,255,255,.2)}
.img-btn:hover{background:var(--primary)}
.input-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:13px;resize:none;height:44px;max-height:120px;outline:none;line-height:1.5}
.input-row textarea:focus{border-color:var(--primary)}
.send-btn{padding:10px 20px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#6d28d9);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,58,237,.4)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.opt-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px;font-size:11px;color:var(--text2)}
.opt-row label{cursor:pointer;padding:3px 10px;border-radius:6px;border:1px dashed var(--border);transition:.2s;display:flex;align-items:center;gap:4px;font-size:11px}
.opt-row label:hover{border-color:var(--primary2);color:var(--primary2)}
.ref-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;background:rgba(245,158,11,.15);color:var(--accent);font-size:10px;font-weight:600}
.ref-badge button{background:none;border:none;color:inherit;cursor:pointer;font-size:12px;padding:0}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;padding:8px 0}
.image-viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;cursor:pointer}
.image-viewer.show{display:flex}
.image-viewer img{max-width:90vw;max-height:90vh;border-radius:8px}
@media(max-width:768px){.sidebar{display:none;position:fixed;left:0;top:0;bottom:0;z-index:50}.sidebar.show{display:flex}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2>创作工坊</h2><button class="btn-icon" onclick="newConv()">+</button><button class="btn-icon" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</button></div>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer"><span id="statusDot" style="color:#10b981">●</span> API 就绪 · <a href="/payment" style="color:var(--primary2)">充值</a> · <span id="credits">-</span>积分</div>
  </div>
  <div class="main">
    <div class="main-header">
      <button class="btn-icon" onclick="document.getElementById('sidebar').classList.toggle('show')" style="display:none" id="mobileMenuBtn">☰</button>
      <h3 id="convTitle">新建对话</h3>
      <select id="pm"><option value="deepseek-chat">DeepSeek</option><option value="deepseek-v4-pro">DeepSeek V4</option><option value="gemini-3-pro-preview">Gemini 3 Pro</option><option value="gpt-5.4">GPT-5.4</option><option value="claude-opus-4-7">Claude Opus</option><option value="qwen3-max">通义千问</option></select>
      <select id="im"><option value="gemini-2.5-flash-image">Gemini Flash</option><option value="gpt-image-2">GPT-Image-2</option><option value="doubao-seedream-5-0-260128">豆包 Seedream</option></select>
      <select id="isz"><option value="1024x1024">1:1</option><option value="1792x1024">16:9</option><option value="1024x1792">9:16</option></select>
      <select id="icnt"><option value="1">1张</option><option value="2">2张</option><option value="4">4张</option></select>
    </div>
    <div class="chat-area" id="chat"></div>
    <div class="input-area">
      <div class="opt-row">
        <span id="refBar"></span>
        <label for="refFiles">📷 参考图</label>
        <input type="file" id="refFiles" accept="image/*" multiple style="display:none" onchange="onRefPick(this)">
        <span id="refInfo" style="font-size:10px"></span>
        <button onclick="clearRefs()" id="refClear" style="display:none;font-size:10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;padding:2px 6px">清除</button>
      </div>
      <div class="input-row">
        <textarea id="uin" placeholder="描述你想要的写真效果..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
      </div>
    </div>
  </div>
</div>
<div class="image-viewer" id="viewer" onclick="this.classList.remove('show')"><img id="viewerImg"></div>

<script>
var $=function(id){return document.getElementById(id)};
var LS=function(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem('px_'+k));localStorage.setItem('px_'+k,JSON.stringify(v))}catch(e){return v===undefined?null:void 0}};
var K={ds:'sk-0fe9505332be4b408cb9030a97d7a199',gw:'sk-p0HiwUiIGlLJjgAB1DhRNyg7K2OIfH4tcREwsQvk9XYVTdry',base:'https://api.geeknow.ai/v1'};
var S={convs:[],activeId:null,loading:false,refFiles:[],refMsg:null};

function newConv(){var c={id:'c'+Date.now(),title:'新建对话',ts:Date.now(),msgs:[]};S.convs.unshift(c);S.activeId=c.id;save();render()}
function curConv(){return S.convs.find(function(x){return x.id===S.activeId})||S.convs[0]}
function delConv(id){S.convs=S.convs.filter(function(x){return x.id!==id});if(S.activeId===id)S.activeId=S.convs.length?S.convs[0].id:null;save();render()}
function switchConv(id){S.activeId=id;render()}
function save(){LS('convs',S.convs)}
function load(){S.convs=LS('convs')||[];S.activeId=S.convs.length?S.convs[0].id:null}

function render(){
  var cl=$('convList'),h='';S.convs.forEach(function(c){h+='<div class="conv-item'+(c.id===S.activeId?' active':'')+'" onclick="switchConv(\\''+c.id+'\\')"><span style=\"overflow:hidden;text-overflow:ellipsis\">'+esc(c.title||'新建对话')+'</span><span class=\"del\" onclick=\"event.stopPropagation();if(confirm(\\'删除对话？\\'))delConv(\\''+c.id+'\\')\">×</span></div>'});cl.innerHTML=h;
  var cv=curConv();$('convTitle').textContent=cv?cv.title:'新建对话';
  var ca=$('chat');
  if(!cv||!cv.msgs.length){ca.innerHTML='<div class="chat-welcome"><h2>AI 写真创作工坊</h2><p>用自然语言描述你想要的写真效果</p><p style="font-size:12px;color:var(--text2)">示例：女生毕业照，校园草坪，阳光明媚，穿着学士服</p></div>';return}
  var html='';cv.msgs.forEach(function(m,i){html+=renderMsg(m,i)});ca.innerHTML=html;ca.scrollTop=ca.scrollHeight}

function renderMsg(m,idx){
  if(m.role==='user')return '<div class="msg user"><div class="msg-avatar">👤</div><div class="msg-bubble"><div class="msg-content">'+esc(m.content)+'</div></div></div>';
  var h='<div class="msg ai"><div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="msg-content">'+esc(m.content)+'</div>';
  if(m.prompt){
    h+='<details class="prompt-box"><summary>查看提示词</summary>';
    ['scene','action','expression','lighting','tone','composition','cn','en'].forEach(function(k){if(m.prompt[k])h+='<div class="fld"><div class="fl">'+k+'</div><div class="fv">'+esc(m.prompt[k])+'</div></div>'});
    h+='</details>';
  }
  if(m.images&&m.images.length){
    h+='<div class="img-grid">';
    m.images.forEach(function(url,i){h+='<div class="img-card"><img src="'+url+'" onclick="viewImg(\\''+url+'\\')"><div class="img-actions"><button class="img-btn" onclick="event.stopPropagation();downloadImg(\\''+url+'\\')">下载</button><button class="img-btn" onclick="event.stopPropagation();useRef('+idx+','+i+')">参考</button></div></div>'});
    h+='</div>';
  }
  h+='<div class="msg-meta">'+new Date(m.ts).toLocaleTimeString()+' · <button onclick="retry('+idx+')">重新生成</button></div></div></div>';
  return h;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Send ──
async function send(){
  if(S.loading)return;var txt=$('uin').value.trim();if(!txt)return;
  S.loading=true;$('sendBtn').disabled=true;$('uin').value='';
  var cv=curConv();if(!cv){newConv();cv=curConv()}
  if(!cv.msgs.length)cv.title=txt.slice(0,30);
  var uMsg={id:'m'+Date.now(),role:'user',content:txt,ts:Date.now()};cv.msgs.push(uMsg);save();render();
  $('chat').insertAdjacentHTML('beforeend','<div class="loading-row"><span class="spinner"></span>AI 正在创作...</div>');$('chat').scrollTop=$('chat').scrollHeight;
  try{
    var prev=null;for(var i=cv.msgs.length-2;i>=0;i--){if(cv.msgs[i].role==='assistant'&&cv.msgs[i].prompt){prev=cv.msgs[i];break}}
    var refImgs=[];if(S.refMsg!==null&&S.refMsg>=0&&S.refMsg<cv.msgs.length&&cv.msgs[S.refMsg].images)refImgs=cv.msgs[S.refMsg].images.slice(0,2);
    var prompt=await genPrompt(txt,prev);
    var imgs=await genImgs(prompt.en,$('im').value,$('isz').value,parseInt($('icnt').value),refImgs,S.refFiles);
    var aMsg={id:'m'+Date.now(),role:'assistant',content:prompt.cn.slice(0,80)+'...',prompt:prompt,images:imgs,ts:Date.now()};cv.msgs.push(aMsg);
    S.refMsg=null;clearRefs();
  }catch(e){cv.msgs.push({id:'m'+Date.now(),role:'system',content:'生成失败: '+e.message,ts:Date.now()})}
  S.loading=false;$('sendBtn').disabled=false;
  document.querySelectorAll('.loading-row').forEach(function(x){x.remove()});
  save();render();
}

async function genPrompt(txt,prev){
  var msgs=[{role:'system',content:SYS}];
  if(prev&&prev.prompt){msgs.push({role:'system',content:'上一轮生成的写真提示词如下，请在此基础上根据用户新需求进行迭代优化，保持整体风格：\\n中文方案：'+prev.prompt.cn+'\\nEnglish Prompt：'+prev.prompt.en})}
  msgs.push({role:'user',content:txt});
  var r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+K.ds},body:JSON.stringify({model:$('pm').value,messages:msgs,temperature:.85,max_tokens:3000})});
  if(!r.ok){var e=await r.json().catch(function(){return{}});throw new Error(e.error?.message||'DeepSeek error '+r.status)}
  return parsePrompt((await r.json()).choices[0].message.content);
}

function parsePrompt(t){
  var r={scene:'',action:'',expression:'',lighting:'',tone:'',composition:'',cn:'',en:''};
  function ex(hdr){var m=t.match(new RegExp(hdr+'\\s*[：:]\\s*(.+?)(?=\\n[📷💃😊💡🎨📐🌐🌍]|\\n━━|\\n🎬|$)','su'));return m?m[1].trim():''}
  r.scene=ex('📷\\s*场景');r.action=ex('💃\\s*动作\\s*/\\s*姿态');r.expression=ex('😊\\s*表情\\s*/\\s*情绪');
  r.lighting=ex('💡\\s*光线方案');r.tone=ex('🎨\\s*色调\\s*/\\s*影调');r.composition=ex('📐\\s*构图建议');
  var m=t.match(/🌐.*?视觉方案.*?\n(.+?)(?=\n🌍|\nEnglish|\n━━|$)/su);if(m)r.cn=m[1].trim();
  m=t.match(/🌍.*?English Prompt.*?\n(.+?)(?=\n━━|\n📝|\n⚠|$)/su);if(m)r.en=m[1].trim();
  if(!r.cn)r.cn=t.trim();if(!r.en||/[\u4e00-\u9fff]/.test(r.en.slice(0,50)))r.en=t.trim();
  r.en=r.en.replace(/[【】⚠].*?[：:].*?\n?/g,'').trim();if(r.en.length>900)r.en=r.en.slice(0,900);
  return r;
}

async function genImgs(en,mdl,size,n,refImgs,localRefs){
  var urls=[];
  for(var i=0;i<n;i++){
    var body={model:mdl,prompt:en+' Chinese portrait 8K ARRI ALEXA LF cinematic Kodak Vision3 500T pristine quality',size:size,n:1};
    if(refImgs&&refImgs.length)body.image=refImgs[i%refImgs.length];
    if(localRefs&&localRefs.length)body.image=await toB64(localRefs[localRefs.length>1?i%localRefs.length:0]);
    var r=await fetch(K.base+'/images/generations',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+K.gw},body:JSON.stringify(body)});
    if(!r.ok){var e=await r.json().catch(function(){return{}});throw new Error(e.error?.message||'Image error '+r.status)}
    var d=await r.json();if(d.data&&d.data[0])urls.push(d.data[0].url);
  }
  return urls;
}

function retry(idx){
  var cv=curConv();if(!cv||idx>=cv.msgs.length)return;cv.msgs.splice(idx,1);save();render();
  var u=cv.msgs[idx-1];if(u&&u.role==='user'){$('uin').value=u.content;send()}
}

function useRef(mIdx,iIdx){S.refMsg=mIdx;$('refBar').innerHTML='<span class="ref-badge">参考对话图 #'+(iIdx+1)+' <button onclick=\"S.refMsg=null;$(\'refBar\').innerHTML=\'\'\" style=\"font-size:12px\">×</button></span>'}

// ── Reference upload ──
var _rf=[];
function onRefPick(i){_rf=Array.from(i.files).slice(0,6);S.refFiles=_rf;$('refInfo').textContent=_rf.length+'张';$('refClear').style.display=_rf.length?'':'none'}
function clearRefs(){_rf=[];S.refFiles=[];$('refInfo').textContent='';$('refClear').style.display='none';$('refFiles').value=''}
function toB64(f){return new Promise(function(rs){var r=new FileReader();r.onload=function(){rs(r.result)};r.readAsDataURL(f)})}

// ── Utils ──
function viewImg(u){$('viewerImg').src=u;$('viewer').classList.add('show')}
function downloadImg(u){var a=document.createElement('a');a.href=u;a.download='ai-photo.jpg';a.click()}
async function loadCredits(){if(location.hostname.indexOf('github.io')>=0)return;try{var r=await fetch('/api/auth/me',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:K.gw})});if(r.ok){var d=await r.json();$('credits').textContent=d.credits||0}}catch(e){}}

// ── System Prompt ──
var SYS='你是一个专业的 AI 写真提示词导演。用户用自然语言描述需求，你自动生成中文视觉方案和英文 prompt。\n\n核心规则：\n1. 所有人物默认为中国人形象(Chinese/East Asian)，英文 prompt 必须包含 Chinese\n2. 抽象形容转化为具体视觉细节\n3. 输出格式：\n📷 场景：{场景}\n💃 动作/姿态：{动作}\n😊 表情/情绪：{表情}\n💡 光线方案：{光线}\n🎨 色调/影调：{色调}\n📐 构图建议：{构图}\n🌐 中文视觉方案（完整融合版）\n{中文描述}\n🌍 English Prompt\n{英文关键词，逗号分隔，前5词定调，含摄影术语}';

// ── Init ──
load();if(!S.convs.length)newConv();render();loadCredits();
</script>
</body>
</html>
