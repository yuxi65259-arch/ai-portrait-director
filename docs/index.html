<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 写真 · 智能创作工坊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060f;--s1:#0d0d1f;--s2:#15152a;--s3:#1c1c38;
  --p1:#7c3aed;--p2:#a78bfa;--p3:#c4b5fd;--p4:#e9d5ff;
  --gold:#f59e0b;--g2:#fbbf24;--g3:#fde68a;
  --red:#ef4444;
  --t1:#f8fafc;--t2:#a5b4fc;--t3:#6366f1;
  --b1:#1e1e40;--b2:#2a2a50;
  --r1:20px;--r2:14px;--r3:10px;
  --sh:0 20px 50px -10px rgba(0,0,0,.6);
  --tr:0.3s cubic-bezier(.4,0,.2,1);
  --ff:'Inter','Noto Sans SC',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--ff);background:var(--bg);color:var(--t1);
  background-image:
    radial-gradient(ellipse 100% 60% at 0% 0%,rgba(124,58,237,.08),transparent),
    radial-gradient(ellipse 80% 40% at 100% 100%,rgba(245,158,11,.04),transparent),
    radial-gradient(ellipse 50% 30% at 50% 60%,rgba(99,102,241,.03),transparent);
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--b1)}

.app{display:flex;height:100vh}

/* Sidebar */
.sb{width:280px;min-width:280px;background:linear-gradient(180deg,var(--s1),var(--s2));border-right:1px solid var(--b1);display:flex;flex-direction:column;z-index:50;transition:transform var(--tr)}
.sb-brand{padding:24px 20px 20px;border-bottom:1px solid var(--b1)}
.sb-brand h1{font-size:16px;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:-.3px}
.sb-brand h1 span{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--p1),#6d28d9);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 16px rgba(124,58,237,.4)}
.sb-actions{display:flex;gap:8px;margin-top:14px}
.sb-btn{
  flex:1;padding:10px;border-radius:12px;border:1.5px solid var(--b1);
  background:var(--s2);color:var(--p2);cursor:pointer;font-family:var(--ff);
  font-size:13px;font-weight:600;transition:var(--tr);text-align:center;
}
.sb-btn:hover{background:var(--s3);border-color:var(--p1);color:var(--p3);transform:translateY(-1px)}
.sb-btn.primary{background:linear-gradient(135deg,var(--p1),#6d28d9);border-color:transparent;color:#fff;box-shadow:0 2px 12px rgba(124,58,237,.3)}
.sb-btn.primary:hover{box-shadow:0 4px 20px rgba(124,58,237,.5);transform:translateY(-2px)}
.sb-list{flex:1;overflow-y:auto;padding:12px}
.sb-item{
  padding:13px 16px;border-radius:var(--r2);cursor:pointer;margin-bottom:3px;
  transition:var(--tr);font-size:13px;color:var(--t2);display:flex;align-items:center;
  justify-content:space-between;border:1.5px solid transparent;
}
.sb-item:hover{background:var(--s3);border-color:var(--b2)}
.sb-item.active{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.25);color:#fff;font-weight:600}
.sb-item .t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sb-item .x{width:22px;height:22px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t3);opacity:0;cursor:pointer;transition:var(--tr);flex-shrink:0;margin-left:8px}
.sb-item .x:hover{background:rgba(239,68,68,.15);color:var(--red);opacity:1}
.sb-item:hover .x{opacity:.5}
.sb-foot{padding:16px 20px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--t3)}
.sb-foot .dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 10px rgba(16,185,129,.5);flex-shrink:0}
.sb-foot a{color:var(--p2);text-decoration:none;font-weight:600;transition:var(--tr)}
.sb-foot a:hover{color:var(--p3)}

/* Main */
.mn{flex:1;display:flex;flex-direction:column;min-width:0}
.mn-head{padding:16px 28px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:14px;background:var(--s1)}
.mn-head h2{font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mn-head select{
  padding:9px 14px;border-radius:10px;background:var(--s2);border:1.5px solid var(--b1);
  color:var(--t2);font-size:12.5px;font-family:var(--ff);outline:none;cursor:pointer;
  transition:var(--tr);font-weight:500;
}
.mn-head select:hover{border-color:var(--p2)}
.mn-head select:focus{border-color:var(--p1)}

/* Chat */
.msgs{flex:1;overflow-y:auto;padding:32px 36px;display:flex;flex-direction:column;gap:28px}
.welc{text-align:center;padding:60px 20px;animation:in .5s ease}
@keyframes in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.welc .ico{display:inline-flex;width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(124,58,237,.05));align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;box-shadow:0 8px 32px rgba(124,58,237,.15)}
.welc h1{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:10px;background:linear-gradient(135deg,var(--p4),var(--p2),var(--g3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welc p{font-size:16px;color:var(--t2);max-width:480px;margin:0 auto 28px;line-height:1.7}
.welc .sugs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.welc .sg{
  padding:12px 22px;border-radius:24px;background:var(--s2);border:1.5px solid var(--b1);
  color:var(--t2);cursor:pointer;font-size:13.5px;font-family:var(--ff);font-weight:500;
  transition:var(--tr);backdrop-filter:blur(8px);
}
.welc .sg:hover{border-color:var(--p2);color:var(--p3);background:var(--s3);transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,58,237,.15)}

/* Messages */
.msg{display:flex;gap:16px;max-width:80%;animation:in .4s ease}
.msg.usr{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.av{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.msg.usr .av{background:linear-gradient(135deg,var(--p1),#6d28d9)}
.msg.ai .av{background:linear-gradient(135deg,#b45309,#92400e)}
.bb{
  background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r1);
  padding:18px 22px;font-size:14px;line-height:1.8;max-width:100%;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.msg.usr .bb{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(124,58,237,.05));border-color:rgba(124,58,237,.25)}
.bc{white-space:pre-wrap;word-break:break-word}
.bm{font-size:11px;color:var(--t3);margin-top:10px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.bm button{background:none;border:none;color:var(--p2);cursor:pointer;font-size:11px;font-weight:600;padding:0;transition:var(--tr)}
.bm button:hover{color:var(--p3)}

/* Prompt details */
.pd{background:rgba(0,0,0,.25);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;margin-top:14px;max-height:240px;overflow-y:auto}
.pd summary{font-size:13px;color:var(--p2);cursor:pointer;font-weight:700;margin-bottom:6px;user-select:none;transition:var(--tr)}
.pd summary:hover{color:var(--p3)}
.pd .fd{margin:5px 0}
.pd .fl{font-size:11px;color:var(--p2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pd .fv{font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap;margin-top:2px}

/* Image grid */
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-top:14px}
.ic{
  position:relative;border-radius:var(--r2);overflow:hidden;
  border:1.5px solid var(--b1);cursor:pointer;transition:var(--tr);
  aspect-ratio:1;box-shadow:0 6px 20px rgba(0,0,0,.3);
}
.ic:hover{border-color:var(--p2);transform:translateY(-3px);box-shadow:0 12px 32px rgba(124,58,237,.2)}
.ic img{width:100%;height:100%;object-fit:cover;display:block}
.ia{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;gap:8px;padding:12px;justify-content:center;opacity:0;transition:var(--tr)}
.ic:hover .ia{opacity:1}
.ib{padding:6px 14px;border-radius:8px;border:none;font-size:11px;cursor:pointer;color:#fff;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);font-family:var(--ff);font-weight:600;transition:var(--tr)}
.ib:hover{background:var(--p1);box-shadow:0 2px 8px rgba(124,58,237,.4)}

/* Input area */
.ip{padding:20px 28px 24px;border-top:1px solid var(--b1);background:linear-gradient(180deg,var(--s1),var(--s2))}
.ip .cats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.ip .cats>span{font-size:13px;color:var(--t3);font-weight:700;margin-right:2px;text-transform:uppercase;letter-spacing:.5px}
.cp{
  padding:11px 20px;border-radius:24px;border:2px solid var(--b2);
  background:var(--s2);color:var(--t2);cursor:pointer;
  font-size:13.5px;font-weight:600;font-family:var(--ff);
  transition:var(--tr);white-space:nowrap;letter-spacing:.2px;
}
.cp:hover{border-color:var(--p2);color:var(--p2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(124,58,237,.1)}
.cp.on{background:linear-gradient(135deg,var(--p1),#6d28d9);border-color:transparent;color:#fff;font-weight:700;box-shadow:0 4px 18px rgba(124,58,237,.4);transform:translateY(-1px)}
.spr{display:none;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.spr.show{display:flex}
.spr .spb{
  padding:9px 18px;border-radius:20px;border:2px solid var(--b1);
  background:transparent;color:var(--t3);cursor:pointer;
  font-size:12.5px;font-weight:600;font-family:var(--ff);
  transition:var(--tr);white-space:nowrap;
}
.spr .spb:hover{border-color:var(--gold);color:var(--gold);background:rgba(245,158,11,.06)}
.spr .spb.on{border-color:var(--gold);color:var(--gold);background:rgba(245,158,11,.1);font-weight:700;box-shadow:0 2px 10px rgba(245,158,11,.15)}
.ref-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:12px;color:var(--t3)}
.ref-row label{
  cursor:pointer;padding:7px 14px;border-radius:10px;
  border:2px dashed var(--b2);transition:var(--tr);
  display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;
}
.ref-row label:hover{border-color:var(--p2);color:var(--p2);background:rgba(124,58,237,.05)}
.rtag{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:10px;background:rgba(245,158,11,.1);color:var(--gold);font-size:11px;font-weight:600}
.rtag button{background:none;border:none;color:var(--gold);cursor:pointer;font-size:13px;padding:0 2px}
.ip-row{display:flex;gap:12px;align-items:flex-end}
.ip-row textarea{
  flex:1;padding:14px 20px;background:var(--s2);border:2px solid var(--b2);
  border-radius:16px;color:var(--t1);font-family:var(--ff);font-size:14px;
  resize:none;height:54px;max-height:150px;outline:none;line-height:1.6;
  transition:var(--tr);box-shadow:inset 0 1px 3px rgba(0,0,0,.2);
}
.ip-row textarea:focus{border-color:var(--p1);box-shadow:0 0 0 4px rgba(124,58,237,.08),inset 0 1px 3px rgba(0,0,0,.2)}
.ip-row textarea::placeholder{color:var(--t3)}
.sbtn{
  padding:15px 32px;border-radius:16px;
  background:linear-gradient(135deg,var(--p1),#6d28d9);
  color:#fff;border:none;font-size:15px;font-weight:700;
  cursor:pointer;transition:var(--tr);white-space:nowrap;
  box-shadow:0 6px 24px rgba(124,58,237,.35);font-family:var(--ff);
  letter-spacing:.3px;
}
.sbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px rgba(124,58,237,.5)}
.sbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* Loading */
.ld{display:flex;align-items:center;gap:10px;color:var(--t3);font-size:13px;padding:10px 0}
.ld .sp{width:20px;height:20px;border:2.5px solid var(--b1);border-top-color:var(--p1);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Viewer */
.vw{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(12px)}
.vw.show{display:flex}
.vw img{max-width:94vw;max-height:94vh;border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.vw .cx{position:absolute;top:28px;right:28px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:22px;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center}
.vw .cx:hover{background:rgba(255,255,255,.15);transform:scale(1.1)}


.dz{position:relative;width:100%;max-width:400px;min-height:80px;border:3px dashed var(--b2);border-radius:16px;display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;transition:var(--tr);background:var(--s2);text-align:center;justify-content:center}
.dz:hover,.dz.drag{border-color:var(--p1);background:rgba(124,58,237,.05);box-shadow:0 0 30px rgba(124,58,237,.1)}
.dz .dico{font-size:28px;flex-shrink:0}
.dz .dtxt{font-size:13px;color:var(--t2);line-height:1.5}
.dz .dtxt span{font-size:11px;color:var(--t3)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dz.has-file{border-style:solid;border-color:var(--gold);padding:8px 14px;min-height:auto;gap:10px}
.dz.has-file .dico{font-size:20px}
.dz.has-file .dtxt{font-size:11px}
.rp-img{width:56px;height:42px;object-fit:cover;border-radius:8px;border:2px solid var(--b1);cursor:pointer;transition:var(--tr)}
.rp-img:hover{border-color:var(--p2);transform:scale(1.05)}
.rp-wrap{position:relative;display:inline-block}
.rp-wrap .rp-x{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

@media(max-width:768px){
  .sb{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:var(--sh)}
  .sb.show{transform:translateX(0)}
  .msg{max-width:95%}
  .msgs{padding:20px 16px}
  .ip{padding:14px 16px}
  .ig{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

var LS=(k,v)=>{try{if(v===undefined)return JSON.parse(localStorage.getItem('px_'+k));localStorage.setItem('px_'+k,JSON.stringify(v))}catch(e){return v===undefined?null:void 0}}

  if(m.role==='user'){var d=document.createElement('div');d.className='msg usr';d.innerHTML='<div class="av">👤</div><div class="bb"><div class="bc">'+esc(m.content)+'</div></div>';return d}

}

async function send(){
  if(S.loading)return;var t=$('uin').value.trim();if(!t)return;S.loading=true;$('sbn').disabled=true;$('uin').value='';
  var c=cv();if(!c){newConv();c=cv()}if(!c.msgs.length)c.title=t.slice(0,30);
  var pt=(S.cat?('【'+S.cat+(S.sub?' · '+S.sub:'')+'】\n'):'')+t;
  c.msgs.push({id:'m'+Date.now(),role:'user',content:pt,ts:Date.now()});save();r();
  $('chat').insertAdjacentHTML('beforeend','<div class="ld"><span class="sp"></span>AI 正在分析需求、生成提示词...</div>');$('chat').scrollTop=$('chat').scrollHeight;
  try{
    var prev=null;for(var i=c.msgs.length-2;i>=0;i--){if(c.msgs[i].role==='assistant'&&c.msgs[i].prompt){prev=c.msgs[i];break}}
    var ri=[];if(S.rm!==null&&S.rm>=0&&S.rm<c.msgs.length&&c.msgs[S.rm].images)ri=c.msgs[S.rm].images.slice(0,2);
    var p=await gp(pt,prev);var imgs=await gi(p.en,$('im').value,$('isz').value,parseInt($('icnt').value),ri,S.rf);
    c.msgs.push({id:'m'+Date.now(),role:'assistant',content:p.cn.slice(0,80)+'…',prompt:p,images:imgs,ts:Date.now()});S.rm=null;clearRefs();
    document.querySelectorAll('.ld').forEach(function(x){x.remove()});
    $('chat').insertAdjacentHTML('beforeend','<div class="ld"><span class="sp"></span>正在生成 '+imgs.length+' 张图片...</div>');$('chat').scrollTop=$('chat').scrollHeight;
    setTimeout(function(){document.querySelectorAll('.ld').forEach(function(x){x.remove()})},1000);
  }catch(e){c.msgs.push({id:'m'+Date.now(),role:'system',content:'❌ 生成失败: '+e.message,ts:Date.now()});document.querySelectorAll('.ld').forEach(function(x){x.remove()})}
  S.loading=false;$('sbn').disabled=false;save();r();
}

async function gp(t,prev){
  var m=[{role:'system',content:SYS}];if(prev&&prev.prompt){m.push({role:'system',content:'上一轮生成的写真提示词：\n中文方案：'+prev.prompt.cn+'\nEnglish Prompt：'+prev.prompt.en+'\n\n请在此基础之上，根据用户的新需求进行迭代调整优化。保持整体风格和色调，只修改用户要求调整的部分。'})}m.push({role:'user',content:t});
  var r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+K.ds},body:JSON.stringify({model:$('pm').value,messages:m,temperature:.85,max_tokens:3000})});
  if(!r.ok){var e=await r.json().catch(function(){return{}});throw new Error(e.error?.message||'API Error '+r.status)}
  return pp((await r.json()).choices[0].message.content);
}

function pp(t){var r={scene:'',action:'',expression:'',lighting:'',tone:'',composition:'',cn:'',en:''};function ex(h){var m=t.match(new RegExp(h+'\\s*[：:]\\s*(.+?)(?=\\n[📷💃😊💡🎨📐🌐🌍]|\\n━━|\\n🎬|$)','su'));return m?m[1].trim():''}r.scene=ex('📷\\s*场景');r.action=ex('💃\\s*动作\\s*/\\s*姿态');r.expression=ex('😊\\s*表情\\s*/\\s*情绪');r.lighting=ex('💡\\s*光线方案');r.tone=ex('🎨\\s*色调\\s*/\\s*影调');r.composition=ex('📐\\s*构图建议');var m=t.match(/🌐.*?视觉方案.*?\n(.+?)(?=\n🌍|\nEnglish|\n━━|$)/su);if(m)r.cn=m[1].trim();m=t.match(/🌍.*?English Prompt.*?\n(.+?)(?=\n━━|\n📝|\n⚠|$)/su);if(m)r.en=m[1].trim();if(!r.cn)r.cn=t.trim();if(!r.en||/[\u4e00-\u9fff]/.test(r.en.slice(0,50)))r.en=t.trim();r.en=r.en.replace(/[【】⚠].*?[：:].*?\n?/g,'').trim();if(r.en.length>900)r.en=r.en.slice(0,900);return r}
